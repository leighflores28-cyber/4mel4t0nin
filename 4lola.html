      color: transparent;

    /* Gallery grid — force exactly 3 columns */

      gap:14px;
      grid-template-columns: repeat(3, 1fr); /* <-- exactly 3 boxes per row */
    }

      background: var(--grad-hello);
      -webkit-background-clip: text; background-clip: text; color: transparent;

      transform: translateY(-2px);
      box-shadow:0 12px 28px rgba(155,122,165,.22);
      outline:none;
      background: var(--grad-hello);

      border: 1px solid #f2e9f7;
      background: var(--grad-hello);
      color: #fff;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      box-shadow: 0 12px 26px var(--ring);
      cursor: pointer;
    }
    .end-btn:hover{ filter: brightness(.96); }

    /* Center modal (reusable) */
    .modal-backdrop{
      position:fixed; inset:0;
      background: rgba(42,35,48,.28);
      display:none;
      align-items:center; justify-content:center;
      z-index: 50;
      padding: 20px;
    }
    .modal-backdrop.show{ display:flex; }

    .modal-card{
      width:min(92vw, 760px);

      transition: transform .28s cubic-bezier(.2,.8,.2,1), opacity .28s ease;
      overflow:hidden;
      max-height: 92vh;
    }
    .modal-backdrop.show .modal-card{
      transform: translateY(0) scale(1);
      opacity:1;
    }

    .modal-head{
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 18px; border-bottom:1px solid #f2e9f7;
    }
    .modal-title{
      margin:0; font-weight:800;
      background: var(--grad-hello);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .modal-close{
      width:36px; height:36px; border-radius:50%;
      border:none; background:transparent; color:var(--mauve-700);
      font-size:20px; cursor:pointer;
    }
    .modal-close:hover{ background:var(--pink-soft); }

    .modal-body{
      padding:18px;
      display:flex;
      flex-direction: column;
      gap: 0;
      min-height: 480px;
      max-height: calc(90vh - 120px);
    }

    .embed-16x9{
      position:relative; width:100%;
      padding-top:56.25%; /* 16:9 */
      border-radius:12px; overflow:hidden;
      background:#000; border:1px solid #f2e9f7;
      flex: 1 1 auto;
    }
    .embed-16x9 video{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      background:#000;
    }

    .embed-fill{
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      min-height: 380px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #f2e9f7;
      background: #121212;
      box-shadow: 0 18px 40px rgba(42,35,48,.12);
    }
    .embed-fill iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    .note{
      text-align:left; line-height:1.7; font-weight:400; color:#5f5568; white-space:pre-wrap;
      flex: 1 1 auto;
    }

      .gallery{ grid-template-columns: 1fr; }
