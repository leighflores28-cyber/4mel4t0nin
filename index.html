<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haii ^__^ !</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- Modal -->
  <div class="modal-overlay show" id="overlay" aria-hidden="false">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="title">
      <!-- One-line title -->
      <h1 id="title" class="title oneline">
        <span class="hello">haii</span>
        <span class="face">
          <span class="caret">^</span>
          <span class="unders">__</span>
          <span class="caret">^</span>
        </span>
        <span class="name">Sammy!</span>
      </h1>

      <p class="subtitle">do you want to see my litol surprises? ✨</p>

      <!-- Buttons: same row, centered -->
      <div class="btn-row">
        <button id="yesBtn" class="btn btn-primary" type="button">YES PLEASE</button>
        <button id="noBtn"  class="btn btn-outline" type="button">NO THANKS</button>
      </div>

      <!-- Optional close -->
      <button class="close-x" id="closeX" aria-label="Close">×</button>
    </div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
